<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Appointment | RVA Style</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Book Your Consultation</h1>
    <p>Schedule time with our specialists - simple and easy</p>
  </header>

  <main class="booking-container">
    <h2 class="section-title">Appointment Details</h2>
    <p class="description">
      Fill out your information and preferred time below. We&rsquo;ll confirm your appointment soon!
    </p>

    <form id="bookingForm">
      <div class="grid">
        <div>
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" name="fullname" autocomplete="name" required>
        </div>
        <div>
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" autocomplete="tel" required>
        </div>
        <div>
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" autocomplete="email" required>
        </div>
        <div>
          <label for="service">Service Type</label>
          <select id="service" name="service" required>
            <option value="">Select Service</option>
            <option>Cabinet Design Consultation</option>
            <option>Showroom Visit</option>
            <option>Custom Quote Review</option>
          </select>
        </div>
        <div>
          <label for="date">Preferred Date</label>
          <input type="date" id="date" name="date" required>
        </div>
        <div>
          <label for="time">Preferred Time</label>
          <div id="timeSlots" class="time-slots" aria-live="polite"></div>
          <input type="hidden" id="selectedTime" name="selectedTime">
        </div>
        <div class="full-width">
          <label for="notes">Additional Notes</label>
          <textarea id="notes" name="notes" rows="3"></textarea>
        </div>
        <!-- Budget Range removed per request -->
        <div class="full-width">
          <button type="submit">Schedule Appointment</button>
        </div>
      </div>
    </form>

    <p class="success" id="successMsg" role="status" aria-live="polite">
      Your appointment request has been sent!
    </p>
  </main>

  <script src="app.js"></script>
</body>
</html>
